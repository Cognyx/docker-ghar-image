name: image-build
on:
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - ".github/workflows/image-build.yaml"
      - "!**.md"
  pull_request:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - ".github/workflows/image-build.yaml"
      - "!**.md"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        timeout-minutes: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        timeout-minutes: 5

      - name: Authenticate to GCP
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: google-github-actions/auth@v3
        timeout-minutes: 1
        with:
          credentials_json: ${{ secrets.GOOGLE_ARTIFACT_REGISTRY_SA_KEY }}

      - name: Login to GAR
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v4
        timeout-minutes: 1
        with:
          registry: ${{ secrets.GOOGLE_ARTIFACT_REGISTRY_LOGIN_SERVER }}
          username: _json_key
          password: ${{ secrets.GOOGLE_ARTIFACT_REGISTRY_SA_KEY }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        timeout-minutes: 1
        with:
          images: ${{ secrets.GOOGLE_ARTIFACT_REGISTRY_LOGIN_SERVER }}/cognyx-471812/ghar-image
          tags: |
            type=raw,value={{branch}}-{{sha}}-{{date 'X'}}
            type=raw,value=latest

      - name: PR Tags
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "tags=test-${{ github.sha }}" >> $GITHUB_ENV
        timeout-minutes: 1

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        timeout-minutes: 10
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ github.ref_name == 'main' }}
          tags: ${{ github.event_name == 'pull_request' && env.tags || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
